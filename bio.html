<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Link in Bio · Trisend</title>
<meta name="description" content="Links page powered by Trisend">
<meta property="og:type" content="website">
<meta property="og:title" id="ogTitle" content="Link in Bio · Trisend">
<meta property="og:description" id="ogDesc" content="Check out my links">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;background:#F8FAFC;}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 60px;}

/* ── Hero header ── */
.hero{width:100%;padding:48px 20px 36px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;z-index:0;}
.hero-content{position:relative;z-index:1;}
.av-wrap{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 16px;border:4px solid rgba(255,255,255,.4);box-shadow:0 8px 32px rgba(0,0,0,.15);}
.av-img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.bio-name{font-size:24px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:6px;text-shadow:0 1px 8px rgba(0,0,0,.2);}
.bio-text{font-size:14px;color:rgba(255,255,255,.85);max-width:280px;line-height:1.6;text-shadow:0 1px 4px rgba(0,0,0,.15);}
.bio-stats{display:flex;gap:16px;margin-top:14px;justify-content:center;}
.bstat{font-size:12px;color:rgba(255,255,255,.7);font-weight:600;}
.bstat strong{color:#fff;font-size:14px;font-weight:900;}

/* ── Links ── */
.links-wrap{width:100%;max-width:480px;padding:24px 16px 0;}
.bio-link{display:flex;align-items:center;gap:14px;padding:15px 18px;border-radius:14px;text-decoration:none;margin-bottom:10px;transition:all .2s;position:relative;overflow:hidden;border:1.5px solid transparent;}
.bio-link:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.bio-link:active{transform:translateY(0);}
.bl-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.bl-title{font-size:14px;font-weight:700;flex:1;}
.bl-arr{flex-shrink:0;opacity:.5;}

/* Themes */
.theme-orange .hero-bg{background:linear-gradient(135deg,#F97316,#EF4444);}
.theme-purple .hero-bg{background:linear-gradient(135deg,#8B5CF6,#EC4899);}
.theme-blue   .hero-bg{background:linear-gradient(135deg,#3B82F6,#06B6D4);}
.theme-green  .hero-bg{background:linear-gradient(135deg,#10B981,#3B82F6);}
.theme-dark   .hero-bg{background:linear-gradient(135deg,#0F172A,#1E293B);}
.theme-gold   .hero-bg{background:linear-gradient(135deg,#F59E0B,#F97316);}

/* Link styles */
.lstyle-solid{background:#fff;border-color:rgba(0,0,0,.06);}
.lstyle-solid .bl-title{color:#0F172A;}
.lstyle-outline{background:transparent;border-color:rgba(0,0,0,.15);}
.lstyle-outline .bl-title{color:#0F172A;}
.lstyle-soft{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.2);}
.lstyle-soft .bl-title{color:#F97316;}

/* ── Powered by ── */
.powered{margin-top:32px;text-align:center;}
.powered a{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#94A3B8;text-decoration:none;padding:6px 14px;border-radius:50px;background:#fff;border:1.5px solid #E2E8F0;}
.powered a:hover{color:#F97316;border-color:#F97316;}
.pw-mark{width:16px;height:16px;border-radius:4px;background:linear-gradient(135deg,#F97316,#EF4444);display:inline-flex;align-items:center;justify-content:center;}

/* ── Loading & Error ── */
#loadState{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;}
.load-mark{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#F97316,#EF4444);display:flex;align-items:center;justify-content:center;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(.91);opacity:.75;}}
#errState{display:none;text-align:center;padding:60px 20px;}
#errState h2{font-size:22px;font-weight:800;margin-bottom:8px;}
#errState p{font-size:14px;color:#64748B;margin-bottom:20px;}
#mainPage{display:none;}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadState">
  <div class="load-mark">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <rect x="1" y="1" width="8" height="8" rx="1.5" fill="white"/>
      <rect x="3.5" y="3.5" width="3" height="3" fill="#F97316"/>
      <rect x="15" y="1" width="8" height="8" rx="1.5" fill="white"/>
      <rect x="17.5" y="3.5" width="3" height="3" fill="#F97316"/>
      <rect x="1" y="15" width="8" height="8" rx="1.5" fill="white"/>
      <rect x="3.5" y="17.5" width="3" height="3" fill="#F97316"/>
    </svg>
  </div>
  <div style="font-size:15px;font-weight:700;color:#0F172A;">Loading…</div>
</div>

<!-- Error -->
<div id="errState">
  <div style="font-size:52px;margin-bottom:12px;">🔍</div>
  <h2>Page Not Found</h2>
  <p>This bio page doesn't exist or has been removed.</p>
  <a href="/" style="display:inline-flex;align-items:center;gap:7px;padding:11px 22px;background:linear-gradient(135deg,#F97316,#EF4444);color:#fff;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;">Create your own →</a>
</div>

<!-- Main bio page -->
<div id="mainPage">
  <div class="page">
    <div class="hero" id="bioHero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <div class="av-wrap" id="bioAv">😊</div>
        <div class="bio-name" id="bioName">Name</div>
        <div class="bio-text" id="bioBio"></div>
        <div class="bio-stats">
          <div class="bstat"><strong id="bioLinkCount">0</strong> links</div>
          <div class="bstat"><strong id="bioViews">0</strong> views</div>
        </div>
      </div>
    </div>
    <div class="links-wrap" id="linksWrap"></div>
    <div class="powered" id="poweredBy">
      <a href="/">
        <span class="pw-mark">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none">
            <rect x="1" y="1" width="8" height="8" rx="1.5" fill="white"/>
            <rect x="15" y="1" width="8" height="8" rx="1.5" fill="white"/>
            <rect x="1" y="15" width="8" height="8" rx="1.5" fill="white"/>
          </svg>
        </span>
        Made with Trisend
      </a>
    </div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey:'AIzaSyCgaYVSaKtXAQOVRTRfAGV6cWjPqG9x4Tc',
  authDomain:'trisend-e7250.firebaseapp.com',
  projectId:'trisend-e7250',
  storageBucket:'trisend-e7250.firebasestorage.app',
  messagingSenderId:'1088068014414',
  appId:'1:1088068014414:web:77c1f5c1de544b6ab5ce1f'
});
const db = firebase.firestore();

// Get username from URL — /u/username
const username = window.location.pathname.split('/u/')[1]?.split('/')[0]?.toLowerCase();

async function loadBio(){
  if(!username){ showErr(); return; }
  try{
    const snap = await db.collection('biopages').doc(username).get();
    if(!snap.exists){ showErr(); return; }
    const data = snap.data();
    if(!data.published){ showErr(); return; }
    renderBio(data);
    // Record view async
    db.collection('biopages').doc(username).update({
      views: firebase.firestore.FieldValue.increment(1)
    }).catch(()=>{});
  }catch(e){ showErr(); }
}

function renderBio(d){
  // Meta tags
  document.title = `${d.displayName} · Trisend`;
  document.getElementById('ogTitle').content  = d.displayName;
  document.getElementById('ogDesc').content   = d.bio || 'Check out my links';

  // Theme
  const hero = document.getElementById('bioHero');
  hero.className = `hero theme-${d.theme||'orange'}`;

  // Avatar
  const avEl = document.getElementById('bioAv');
  if(d.avatarURL){
    avEl.innerHTML = `<img class="av-img" src="${d.avatarURL}" alt="${d.displayName}">`;
  } else {
    avEl.textContent = d.avatarEmoji || '😊';
  }

  // Apply theme bg color to avWrap
  document.getElementById('bioName').textContent  = d.displayName || username;
  document.getElementById('bioBio').textContent   = d.bio || '';
  document.getElementById('bioLinkCount').textContent = (d.links||[]).length;
  document.getElementById('bioViews').textContent = ((d.views||0)+1).toLocaleString();

  // Links
  const wrap  = document.getElementById('linksWrap');
  const links = d.links || [];
  const style = d.linkStyle || 'solid';

  wrap.innerHTML = links.filter(l=>l.url&&l.title).map(l=>`
    <a class="bio-link lstyle-${style}" href="${escUrl(l.url)}" target="_blank" rel="noopener" onclick="trackClick('${username}','${escAttr(l.title)}')">
      <div class="bl-ico">${l.icon||'🔗'}</div>
      <div class="bl-title">${escHtml(l.title)}</div>
      <div class="bl-arr">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>`).join('');

  // Branding — hide for premium
  if(d.hideBranding){
    document.getElementById('poweredBy').style.display = 'none';
  }

  // Show page
  document.getElementById('loadState').style.display = 'none';
  document.getElementById('mainPage').style.display  = 'block';
}

function trackClick(username, title){
  db.collection('biopages').doc(username).update({
    linkClicks: firebase.firestore.FieldValue.arrayUnion({
      title, ts: new Date().toISOString()
    })
  }).catch(()=>{});
}

function showErr(){
  document.getElementById('loadState').style.display = 'none';
  document.getElementById('errState').style.display  = 'block';
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function escUrl(s){
  try{ return new URL(s).href; }
  catch{ return s.startsWith('http') ? s : 'https://'+s; }
}

loadBio();
</script>
</body>
</html>
